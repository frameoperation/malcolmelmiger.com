<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Malcolm Elmiger</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #FBFAF8;
      color: #15171C;
      font-family: "Space Grotesk", system-ui, sans-serif;
      text-align: center;
      padding: 28px;
    }
    .eyebrow {
      font-family: "Space Mono", monospace;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #1A26B8;
      margin: 0 0 14px;
    }
    h1 {
      font-size: clamp(64px, 18vw, 160px);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1;
      margin: 0 0 18px;
    }
    a {
      color: #2230E0;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 2px solid #2230E0;
      padding-bottom: 2px;
    }
    a:hover { color: #1A26B8; border-color: #1A26B8; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Seite nicht gefunden</p>
    <h1>404</h1>
    <p><a href="/">Zurück zur Startseite</a></p>
  </main>
</body>
</html>
